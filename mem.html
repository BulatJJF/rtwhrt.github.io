<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="author" content="Низаев Булат">
    <meta name="copyright" content="© Низаев Булат, 2026">
    <title>terry · mem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            overflow: hidden;
        }
        #mem-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
            pointer-events: none;
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .back-link:hover {
            background: rgba(40, 40, 50, 0.7);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }
        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            user-select: none;
        }
        .sound-toggle:hover {
            background: rgba(40, 40, 50, 0.7);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
        .caption {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .back-link {
                top: 12px;
                left: 12px;
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
            .sound-toggle {
                bottom: 12px;
                right: 12px;
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .caption {
                bottom: 12px;
                left: 12px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

<video autoplay playsinline id="mem-video" poster="assets/mem-preview.jpg">
    <source src="assets/terry.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<a href="index.html" class="back-link">← На главную</a>
<div class="caption">Terry A. Davis</div>

<div class="sound-toggle" id="soundToggle" title="Включить звук">🔇</div>

<script>
    (function() {
        "use strict";

        const video = document.getElementById('mem-video');
        const soundToggle = document.getElementById('soundToggle');
        
        video.muted = true;
        video.volume = 0.6;
        let isMuted = true;
        soundToggle.textContent = '🔇';
        soundToggle.title = 'Включить звук';

        video.addEventListener('ended', () => {
            window.location.href = 'index.html';
        });

        video.addEventListener('error', () => {
            console.warn('Видео terry.mp4 не найдено.');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        });

        function toggleSound() {
            if (isMuted) {
                video.muted = false;
                video.play().then(() => {
                    isMuted = false;
                    soundToggle.textContent = '🔊';
                    soundToggle.title = 'Выключить звук';
                }).catch(err => {
                    console.warn('Не удалось включить звук:', err);
                    video.muted = true;
                    soundToggle.title = 'Нажмите для включения звука';
                });
            } else {
                video.muted = true;
                isMuted = true;
                soundToggle.textContent = '🔇';
                soundToggle.title = 'Включить звук';
            }
        }

        soundToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSound();
        });

        video.play().catch(err => {
            console.warn('Автовоспроизведение видео заблокировано.');
        });

        video.addEventListener('loadedmetadata', () => {
            if (video.paused) {
                video.play().catch(() => {});
            }
        });

        window.addEventListener('beforeunload', function() {
            if (video && !video.paused) {
                video.pause();
                video.currentTime = 0;
            }
        });

        // Остановка при клике на ссылку "На главную"
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function() {
                if (video && !video.paused) {
                    video.pause();
                    video.currentTime = 0;
                }
            });
        });

    })();
</script>

</body>
</html>
